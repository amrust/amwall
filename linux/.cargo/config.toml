# Vendored-sources mode for the userspace workspace (amwall-daemon,
# amwall-cli). Every dep is mirrored under linux/vendor/ and cargo
# is told to use that mirror instead of crates.io.
#
# Combined with a committed Cargo.lock, this means:
#   - `cargo build --frozen --offline`  works on an air-gapped box
#   - reproducibility — a future crates.io yank can't change our build
#   - clone-and-go — no `cargo fetch` round-trip on first build
#
# Re-vendoring: when any Cargo.toml changes, run from this directory:
#   cargo vendor --versioned-dirs vendor
# and commit the diff. The path is relative to this config file, so
# `vendor` resolves to linux/vendor/.

[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"
