# BPF target settings for amwall-ebpf.
#
# bpfel-unknown-none is little-endian BPF on no_std with core only —
# the rust-src nightly component supplies the core crate sources and
# build-std=core builds them as part of every compile.
#
# Phase 6.10 deliberately keeps the userspace vendored-sources
# replacement OUT of any .cargo/config.toml that's an ancestor of
# this directory. Cargo merges configs up the directory tree, so a
# `[source.crates-io] replace-with = ...` at linux/.cargo/config.toml
# would silently leak in here and tell cargo to look for aya-ebpf
# under linux/vendor/ (the userspace mirror, where it doesn't exist).
# Userspace builds now pass --config flags inline from linux-build.sh
# instead of carrying a config file, so ebpf inherits nothing and
# fetches its small (~23 crate) dep tree from upstream as normal.

[build]
target = "bpfel-unknown-none"

[unstable]
build-std = ["core"]
