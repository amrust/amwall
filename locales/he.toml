# --- אשף ההפעלה הראשונה ---
[wizard]
title = "ברוך הבא ל-amwall"
subtitle = "לייבא הגדרת simplewall?"
import_btn = "ייבא"
start_fresh_btn = "התחל מחדש"
body = """amwall מצא הגדרת simplewall קיימת:

• נתיב: %{path}
• %{apps} יישומים עם כללים
• %{rules} כללים מותאמים אישית

ייבוא מעתיק את profile.xml של simplewall ל-amwall ומשתמש בו כנקודת מוצא. simplewall נשאר מותקן והמסננים שלו פעילים בקרנל — השבת את simplewall לפני לחיצה על "הפעל מסננים" ב-amwall כדי למנוע שתי חומות אש שמיישמות כללים חופפים.

ניתן להריץ קובץ → ייבוא מאוחר יותר אם תדלג כעת."""

